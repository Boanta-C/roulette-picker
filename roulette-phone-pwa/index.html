<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Roulette" />
  <meta name="theme-color" content="#111018" />
  <title>Roulette</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #111018;
      --bg2:       #191421;
      --surface:   rgba(31, 29, 42, 0.82);
      --surface2:  rgba(46, 42, 60, 0.88);
      --surface3:  rgba(255, 255, 255, 0.055);
      --border:    rgba(255,255,255,0.10);
      --border2:   rgba(255,255,255,0.16);
      --text:      #f7f2ff;
      --muted:     #aaa0bd;
      --soft:      #c7b9e6;
      --accent:    #ffd08a;
      --accent2:   #8fb3d9;
      --danger:    #ff6f8f;
      --radius-sm: 14px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --shadow:    0 24px 70px rgba(0,0,0,0.42);
      --glow-a:    143, 179, 217;
      --glow-b:    255, 208, 138;
      --glow-c:    126, 96, 184;
      --button-start: #8fb3d9;
      --button-end:   #ffd08a;
      --button-text:  #111018;
      --button-shadow: rgba(143, 179, 217, 0.22);
      --spin-text:    #cfe7ff;
    }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 0%, rgba(var(--glow-a), 0.16), transparent 32%),
        radial-gradient(circle at 85% 10%, rgba(var(--glow-b), 0.16), transparent 30%),
        radial-gradient(circle at 50% 110%, rgba(var(--glow-c), 0.13), transparent 36%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      transition: background .48s ease, color .48s ease;
    }

    body {
      display: flex;
      justify-content: center;
      padding: env(safe-area-inset-top, 18px) 0 env(safe-area-inset-bottom, 18px);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, transparent, black 12%, black 76%, transparent);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 22% 0%, rgba(var(--glow-a), 0.18), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(var(--glow-b), 0.16), transparent 32%),
        radial-gradient(circle at 50% 105%, rgba(var(--glow-c), 0.14), transparent 42%);
      transition: opacity .72s ease, background .72s ease;
      z-index: 0;
    }

    body.theme-rolling-page::after {
      opacity: .42;
      animation: themeWash 1.35s ease-in-out infinite alternate;
    }

    body.theme-transition,
    body.theme-transition * {
      transition:
        background-color .62s ease,
        background .62s ease,
        color .62s ease,
        border-color .62s ease,
        box-shadow .62s ease,
        filter .62s ease,
        opacity .62s ease,
        transform .24s ease;
    }

    #app {
      width: 100%;
      max-width: 430px;
      padding: 22px 18px 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      z-index: 1;
    }

    .theme-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background:
        radial-gradient(circle at 31% 25%, rgba(255,255,255,0.72), rgba(255,255,255,0.18) 22%, transparent 36%),
        radial-gradient(circle at 64% 78%, rgba(0,0,0,0.16), transparent 34%),
        conic-gradient(from 20deg, var(--button-start), var(--accent), var(--button-end), var(--accent2), var(--button-start));
      color: transparent;
      box-shadow: 0 12px 30px rgba(0,0,0,.24), 0 0 22px rgba(var(--glow-a), .10);
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 3;
      overflow: hidden;
      transition: transform .18s ease, filter .24s ease, box-shadow .45s ease, background .62s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .theme-btn::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: inherit;
      background: radial-gradient(circle at 36% 28%, rgba(255,255,255,.24), transparent 42%);
      opacity: .85;
    }

    .theme-btn span { display: none; }

    .theme-btn:hover:not(:disabled) {
      transform: translateY(-1px) rotate(10deg);
      filter: brightness(1.06) saturate(1.05);
      box-shadow: 0 14px 36px rgba(0,0,0,.28), 0 0 26px rgba(var(--glow-b), .15);
    }

    .theme-btn:active:not(:disabled) { transform: scale(.94) rotate(18deg); }
    .theme-btn:disabled { cursor: wait; }

    .theme-btn.theme-rolling {
      animation: themeRoll 1.25s cubic-bezier(.2,.8,.2,1) infinite;
    }

    .header {
      text-align: center;
      padding: 18px 8px 22px;
    }

    .header .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.045);
      color: var(--soft);
      font-size: 10px;
      letter-spacing: .13em;
      text-transform: uppercase;
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 30px rgba(143,179,217,0.07);
    }

    .theme-btn,
    .drum,
    .panel,
    .entry-row,
    .spin-btn,
    .add-row input,
    .add-row button {
      transition-property: background, border-color, box-shadow, color, filter, transform;
      transition-duration: .38s;
      transition-timing-function: ease;
    }

    .header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(34px, 11vw, 48px);
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: .92;
      color: var(--text);
      text-shadow: 0 14px 38px rgba(var(--glow-a), 0.14);
    }

    .subtitle {
      margin: 10px auto 0;
      max-width: 280px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .drum {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.105), rgba(255,255,255,0.025)),
        radial-gradient(circle at 50% -20%, rgba(var(--glow-b), 0.20), transparent 48%),
        var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      padding: 34px 24px;
      text-align: center;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(18px);
    }

    .drum::before {
      content: '✦';
      position: absolute;
      top: 16px;
      right: 18px;
      color: rgba(var(--glow-b), 0.56);
      font-size: 19px;
      transform: rotate(10deg);
    }

    .drum::after {
      content: '';
      position: absolute;
      inset: -45% -20% auto;
      height: 120px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: rotate(-12deg);
      opacity: .7;
    }

    .drum.is-spinning {
      border-color: rgba(var(--glow-b), 0.22);
      box-shadow: var(--shadow), 0 0 42px rgba(var(--glow-a), 0.10), inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .drum.is-landed {
      border-color: rgba(var(--glow-b), 0.42);
      background:
        linear-gradient(135deg, rgba(var(--glow-b),0.17), rgba(var(--glow-a),0.09)),
        radial-gradient(circle at 50% 0%, rgba(var(--glow-b), 0.26), transparent 54%),
        var(--surface);
    }

    .drum-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.08;
      letter-spacing: -0.035em;
      position: relative;
      z-index: 1;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .drum-text.spinning {
      color: var(--spin-text);
      font-size: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .drum-text.landed {
      color: var(--accent);
      text-shadow: 0 0 22px rgba(var(--glow-b), 0.25);
    }

    .drum-label {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(var(--glow-b), 0.10);
      border: 1px solid rgba(var(--glow-b), 0.18);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .drum-empty {
      font-size: 14px;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .spin-btn {
      width: 100%;
      padding: 17px 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
      background:
        linear-gradient(135deg, var(--button-start), var(--button-end) 115%);
      color: var(--button-text);
      border: 0;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform .12s ease, filter .18s ease, opacity .2s ease, box-shadow .18s ease;
      margin-bottom: 18px;
      box-shadow: 0 16px 40px var(--button-shadow), inset 0 1px 0 rgba(255,255,255,0.35);
      -webkit-user-select: none;
      user-select: none;
    }

    .spin-btn:hover:not(:disabled) { filter: brightness(1.04); box-shadow: 0 18px 46px var(--button-shadow), inset 0 1px 0 rgba(255,255,255,0.38); }
    .spin-btn:active:not(:disabled) { transform: scale(0.975); filter: brightness(.98); }
    .spin-btn:disabled { opacity: .58; cursor: not-allowed; }

    .panel {
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 40px rgba(0,0,0,0.18);
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .add-row input {
      flex: 1;
      min-width: 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .add-row input::placeholder { color: rgba(255,244,251,0.42); }
    .add-row input:focus {
      border-color: rgba(var(--glow-b), 0.45);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(var(--glow-b), 0.08);
    }

    .add-row button {
      width: 48px;
      flex: 0 0 48px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-size: 23px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .12s ease, background .16s ease, border-color .16s ease;
      line-height: 1;
    }

    .add-row button:active { transform: scale(.95); background: rgba(255,255,255,0.12); }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 42vh;
      overflow: auto;
      padding-right: 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }


    .entries::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .entry-row {
      display: flex;
      align-items: center;
      padding: 12px 12px 12px 13px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.085);
      border-radius: 16px;
      transition: background .25s ease, border-color .25s ease, transform .14s ease;
      gap: 10px;
    }

    .entry-row::before {
      content: '•';
      color: rgba(var(--glow-a), 0.72);
      font-size: 13px;
      line-height: 1;
    }

    .entry-row:hover { background: rgba(255,255,255,0.075); border-color: rgba(255,255,255,0.13); }

    .entry-row.winner {
      background: rgba(var(--glow-b), 0.13);
      border-color: rgba(var(--glow-b), 0.36);
      transform: translateY(-1px);
    }

    .entry-row.winner::before { content: '★'; color: var(--accent); }

    .entry-row span {
      flex: 1;
      min-width: 0;
      font-size: 15px;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .entry-row.winner span { color: var(--accent); font-weight: 700; }

    .del-btn {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      color: rgba(255,244,251,0.45);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: color .15s ease, background .15s ease, border-color .15s ease, transform .1s ease;
    }

    .del-btn:hover { color: var(--danger); border-color: rgba(255,111,143,0.24); background: rgba(255,111,143,0.08); }
    .del-btn:active { transform: scale(.92); }

    .footer {
      text-align: center;
      margin-top: 13px;
      font-size: 12px;
      color: rgba(255,244,251,0.48);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px) scale(.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.86) rotate(-1deg); }
      62%  { transform: scale(1.055) rotate(.6deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes shimmer {
      0% { transform: translateX(-120%) rotate(18deg); opacity: 0; }
      24% { opacity: .8; }
      100% { transform: translateX(120%) rotate(18deg); opacity: 0; }
    }

    @keyframes themeRoll {
      from { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.04); }
      to   { transform: rotate(360deg) scale(1); }
    }

    @keyframes themeWash {
      from { opacity: .26; filter: saturate(1.02); }
      to   { opacity: .48; filter: saturate(1.18); }
    }

    .anim-slide { animation: slideUp .09s ease-out both; }
    .anim-pop   { animation: popIn .44s cubic-bezier(0.34,1.56,0.64,1) both; }

    .drum.is-landed .drum-text::after {
      content: '';
      position: absolute;
      inset: -8px -18px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform: translateX(-120%) rotate(18deg);
      animation: shimmer .78s ease-out .12s both;
      pointer-events: none;
    }

    @media (max-width: 360px) {
      #app { padding-left: 14px; padding-right: 14px; }
      .drum { padding-left: 18px; padding-right: 18px; }
      .drum-text { font-size: 25px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <button class="theme-btn" id="theme-btn" onclick="spinTheme()" aria-label="Spin theme" title="Spin theme"></button>

    <div class="header">
      <h1>Roulette</h1>
      <p class="subtitle">Let fate pick.</p>
    </div>

    <div class="drum" id="drum"></div>

    <button class="spin-btn" id="spin-btn" onclick="doSpin()">Spin</button>

    <div class="panel">
      <div class="add-row">
        <input id="new-entry" type="text" placeholder="Add an activity…" onkeydown="if(event.key==='Enter')addEntry()" />
        <button onclick="addEntry()" aria-label="Add">+</button>
      </div>

      <div class="entries" id="entries-list"></div>
      <div class="footer" id="footer"></div>
    </div>
  </div>

  <script>
    const DEFAULT = [

      "Cook something new", "Listen to music"

      },
      {

        vars: {

          '--surface': 'rgba(39, 24, 50, 0.84)', '--surface2': 'rgba(58, 35, 73, 0.88)', '--surface3': 'rgba(255,255,255,0.05)',
          '--text': '#fbf0ff', '--muted': '#bca7c7', '--soft': '#d5b7e7',

          '--glow-a': '201, 148, 255', '--glow-b': '231, 192, 111', '--glow-c': '86, 48, 115',
          '--button-start': '#c994ff', '--button-end': '#e7c06f', '--button-text': '#180d1f',

      },
      {
        name: 'Ocean',
        vars: {
          '--bg': '#061116', '--bg2': '#0b1d25',
          '--surface': 'rgba(18, 41, 51, 0.84)', '--surface2': 'rgba(28, 60, 74, 0.88)', '--surface3': 'rgba(255,255,255,0.05)',
          '--text': '#effcff', '--muted': '#9ab9c1', '--soft': '#bde7ee',

          '--accent': '#dbff5f', '--accent2': '#45f7ff',
          '--glow-a': '69, 247, 255', '--glow-b': '219, 255, 95', '--glow-c': '38, 92, 110',
          '--button-start': '#45f7ff', '--button-end': '#dbff5f', '--button-text': '#071014',

    let themeIdx = Number(localStorage.getItem(THEME_KEY));
    if (!Number.isInteger(themeIdx) || themeIdx < 0 || themeIdx >= THEMES.length) themeIdx = 0;

    let entries = JSON.parse(localStorage.getItem('roulette_entries') || 'null') || [...DEFAULT];
    let spinning = false;
    let winner = null;
    let displayIdx = 0;
    let tickTimer = null;

    function save() {
      localStorage.setItem('roulette_entries', JSON.stringify(entries));
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function applyTheme(idx, persist = false) {
      const theme = THEMES[idx];
      Object.entries(theme.vars).forEach(([key, value]) => {
        document.documentElement.style.setProperty(key, value);
      });

      const metaTheme = document.querySelector('meta[name="theme-color"]');
      if (metaTheme) metaTheme.setAttribute('content', theme.vars['--bg'] || '#111018');

      const btn = document.getElementById('theme-btn');
      if (btn) {
        btn.title = `Theme: ${theme.name}`;
        btn.setAttribute('aria-label', `Theme: ${theme.name}. Spin theme`);
      }

      themeIdx = idx;
      if (persist) localStorage.setItem(THEME_KEY, String(idx));
    }

    function previewThemeOnButton(idx) {
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      const vars = THEMES[idx].vars;
      [
        '--button-start',
        '--button-end',
        '--button-text',
        '--button-shadow',
        '--accent',
        '--accent2',
        '--glow-a',
        '--glow-b'
      ].forEach(key => btn.style.setProperty(key, vars[key]));
    }

    function clearButtonThemePreview() {
      const btn = document.getElementById('theme-btn');
      if (!btn) return;
      [
        '--button-start',
        '--button-end',
        '--button-text',
        '--button-shadow',
        '--accent',
        '--accent2',
        '--glow-a',
        '--glow-b'
      ].forEach(key => btn.style.removeProperty(key));
    }

    function randomThemeIndex(excludeIdx) {
      if (THEMES.length <= 1) return 0;
      let idx = excludeIdx;
      while (idx === excludeIdx) idx = Math.floor(Math.random() * THEMES.length);
      return idx;
    }

    function spinTheme() {
      const btn = document.getElementById('theme-btn');
      if (!btn || btn.disabled) return;

      btn.disabled = true;
      btn.classList.add('theme-rolling');
      document.body.classList.add('theme-transition', 'theme-rolling-page');

      const originalIdx = themeIdx;
      const finalIdx = randomThemeIndex(themeIdx);
      const previewSteps = 5 + Math.floor(Math.random() * 3);
      const used = new Set([themeIdx]);
      let step = 0;
      let delay = 300;

      function nextPreviewIndex() {
        if (step >= previewSteps - 1) return finalIdx;
        let idx = randomThemeIndex(themeIdx);
        let guard = 0;
        while ((idx === finalIdx || used.has(idx)) && guard < 20) {
          idx = randomThemeIndex(themeIdx);
          guard++;
        }
        used.add(idx);
        return idx;
      }

      function rollPreview() {
        const idx = nextPreviewIndex();
        applyTheme(idx, false);
        step++;

        if (step >= previewSteps) {
          setTimeout(() => {
            applyTheme(finalIdx, true);
            btn.disabled = false;
            btn.classList.remove('theme-rolling');
            document.body.classList.remove('theme-rolling-page');
            setTimeout(() => document.body.classList.remove('theme-transition'), 760);
          }, 560);
          return;
        }

        delay = Math.min(delay * 1.16, 560);
        setTimeout(rollPreview, delay);
      }

      rollPreview();
    }

    function setDrum(text, state) {
      const d = document.getElementById('drum');
      d.className = 'drum';
      if (state === 'spin') d.classList.add('is-spinning');
      if (state === 'land') d.classList.add('is-landed');

      if (state === 'empty') {
        d.innerHTML = `<p class="drum-empty">Add entries below to spin</p>`;
      } else if (state === 'spin') {
        d.innerHTML = `<p class="drum-text spinning anim-slide">${esc(text)}</p>`;
      } else if (state === 'land') {
        d.innerHTML = `<p class="drum-text landed anim-pop">${esc(text)}</p><span class="drum-label">That's the one</span>`;
      } else {
        d.innerHTML = `<p class="drum-text">${esc(text)}</p>`;
      }
    }

    function renderEntries() {
      const list = document.getElementById('entries-list');
      list.innerHTML = '';
      entries.forEach((e, i) => {
        const row = document.createElement('div');
        row.className = 'entry-row' + (winner === e ? ' winner' : '');
        row.innerHTML = `<span>${esc(e)}</span><button class="del-btn" onclick="removeEntry(${i})" aria-label="Remove">×</button>`;
        list.appendChild(row);
      });
      const f = document.getElementById('footer');
      f.textContent = entries.length
        ? `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}${entries.length < 2 ? ' — add more to spin' : ''}`
        : '';
    }

    function doSpin() {
      if (spinning || entries.length < 2) return;
      spinning = true;
      winner = null;
      clearTimeout(tickTimer);

      const winIdx = Math.floor(Math.random() * entries.length);
      const btn = document.getElementById('spin-btn');
      btn.disabled = true;
      btn.textContent = 'Spinning…';
      renderEntries();

      let count = 0;
      let delay = 42;
      const totalTicks = 32 + entries.length * 2 + Math.floor(Math.random() * 7);

      function tick() {
        displayIdx = (displayIdx + 1) % entries.length;
        setDrum(entries[displayIdx], 'spin');
        count++;
        if (count > totalTicks * 0.56) delay = Math.min(delay * 1.11, 280);
        if (count >= totalTicks) {
          displayIdx = winIdx;
          winner = entries[winIdx];
          spinning = false;
          setDrum(winner, 'land');
          renderEntries();
          btn.disabled = false;
          btn.textContent = 'Spin again';
          return;
        }
        tickTimer = setTimeout(tick, delay);
      }
      tickTimer = setTimeout(tick, delay);
    }

    function addEntry() {
      const inp = document.getElementById('new-entry');
      const val = inp.value.trim();
      if (!val || entries.includes(val)) { inp.focus(); return; }
      entries.push(val);
      save();
      inp.value = '';
      inp.focus();
      if (entries.length === 1) setDrum(entries[0], 'idle');
      renderEntries();
    }

    function removeEntry(i) {
      if (spinning) return;
      if (winner === entries[i]) {
        winner = null;
        setDrum(entries[displayIdx < entries.length - 1 ? displayIdx : 0] || '', entries.length > 1 ? 'idle' : 'empty');
      }
      entries.splice(i, 1);
      save();
      if (entries.length === 0) setDrum('', 'empty');
      renderEntries();
    }

    applyTheme(themeIdx, false);
    setDrum(entries[0] || '', entries.length ? 'idle' : 'empty');
    renderEntries();

    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
